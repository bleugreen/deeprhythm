name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" soundfile

      - name: Lint
        run: ruff check src/

      - name: Download model weights
        run: |
          mkdir -p ~/.local/share/deeprhythm
          curl -sL https://github.com/bleugreen/deeprhythm/raw/main/weights/deeprhythm-0.7.pth \
            -o ~/.local/share/deeprhythm/deeprhythm-0.7.pth

      - name: Test
        run: pytest
